<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | WeatherScope Pro</title>

    <link rel="stylesheet" href="login.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
    <script src="../js/login.js"></script>

</head>

<body>

    <!-- Background Animation -->
    <div class="login-bg">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Floating Weather Icons -->
    <div class="floating-icons">
        <i class="fa-solid fa-cloud icon-cloud"></i>
        <i class="fa-solid fa-sun icon-sun"></i>
        <i class="fa-solid fa-cloud-rain icon-rain"></i>
        <i class="fa-solid fa-bolt icon-bolt"></i>
    </div>

    <div class="login-container">

        <div class="login-card">

            <div class="logo-box">
                <div class="logo-icon">
                    <i class="fa-solid fa-cloud-sun-rain"></i>
                </div>

                <h1>WeatherScope</h1>
                <p>Login to access your weather analytics dashboard</p>
            </div>

            <form onsubmit="loginUser(event)">

                <div class="input-group">
                    <label>Email Address</label>

                    <div class="input-box">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>

                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <i class="fa-solid fa-eye password-toggle" onclick="togglePassword()"></i>
                    </div>
                </div>

                <div class="login-options">
                    <label>
                        <input type="checkbox" id="rememberMe">
                        Remember me
                    </label>

                    <a href="#" onclick="forgotPassword()">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    Login
                </button>

                <div class="divider">
                    <span></span>
                    <p>Demo Account</p>
                    <span></span>
                </div>

                <div class="demo-box">
                    <p><i class="fa-solid fa-envelope"></i> Email: <b>admin@gmail.com</b></p>
                    <p><i class="fa-solid fa-key"></i> Password: <b>12345</b></p>
                </div>

            </form>

        </div>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
